services:
  - type: worker
    name: skyecho-discord-bot
    runtime: node
    plan: starter
    buildCommand: npm install && python3 -m pip install vosk piper-tts && npm run download:vosk-model
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: TTS_MODE
        value: none
      - key: COMMAND_PREFIX
        value: "!sky"
      - key: DEFAULT_CALLSIGN
        value: "SkyEcho Seven Three Eight"
      - key: DEFAULT_PHASE
        value: departure
