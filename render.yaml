services:
  - type: web
    name: skyecho-discord-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: TTS_MODE
        value: none
      - key: DEFAULT_CALLSIGN
        value: SkyEcho Seven Three Eight
      - key: DEFAULT_PHASE
        value: departure
